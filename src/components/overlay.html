<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    #caption {
      color: white;
      font-size: 22px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 12px;
      padding: 8px 24px;
      text-align: center;
      max-width: 860px;
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #caption:active { cursor: grabbing; }

    #line-prev {
      font-size: 19px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }

    #line-prev.visible {
      max-height: 2em;
      opacity: 1;
    }

    #line-curr {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.5s ease;
    }

    #caption.fading #line-prev,
    #caption.fading #line-curr {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="caption">
    <div id="line-prev"></div>
    <div id="line-curr">Waiting for transcription...</div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    const caption  = document.getElementById("caption");
    const linePrev = document.getElementById("line-prev");
    const lineCurr = document.getElementById("line-curr");

    const CLEAR_DELAY = 10000;
    let clearTimer = null;

    function resetClearTimer() {
      clearTimeout(clearTimer);
      caption.classList.remove("fading");

      clearTimer = setTimeout(() => {
        caption.classList.add("fading");

        // Após o fade, limpa o texto
        setTimeout(() => {
          linePrev.textContent = "";
          linePrev.classList.remove("visible");
          lineCurr.textContent = "";
          caption.classList.remove("fading");
        }, 500);
      }, CLEAR_DELAY);
    }

    ipcRenderer.on("caption", (_, text) => {
      const prev = lineCurr.textContent;

      if (prev && prev !== "Waiting for transcription...") {
        linePrev.textContent = prev;
        linePrev.classList.add("visible");
      } else {
        linePrev.textContent = "";
        linePrev.classList.remove("visible");
      }

      lineCurr.textContent = text;
      resetClearTimer();
    });

    const el = document.getElementById("caption");
    let dragging = false;
    let startX = 0, startY = 0;
    let winX = 0, winY = 0;

    el.addEventListener("mousedown", (e) => {
      dragging = true;
      startX = e.screenX;
      startY = e.screenY;
      winX = window.screenX;
      winY = window.screenY;
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const dx = e.screenX - startX;
      const dy = e.screenY - startY;
      ipcRenderer.send("overlay-drag", { x: winX + dx, y: winY + dy });
    });

    window.addEventListener("mouseup", () => { dragging = false; });
  </script>
</body>
</html>
