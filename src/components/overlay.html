<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    #caption {
      color: white;
      font-size: 22px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 12px;
      padding: 10px 28px;
      text-align: center;
      max-width: 900px;
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: opacity 0.6s ease;
    }

    #caption:active { cursor: grabbing; }

    #line-prev {
      font-size: 19px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 0px;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.4s ease;
    }

    #line-prev.visible {
      max-height: 2em;
      opacity: 1;
    }

    #line-curr {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #caption.fading {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="caption">
    <div id="line-prev"></div>
    <div id="line-curr">Waiting for transcription...</div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    const caption  = document.getElementById("caption");
    const linePrev = document.getElementById("line-prev");
    const lineCurr = document.getElementById("line-curr");

    const CLEAR_DELAY    = 4000;
    const MIN_CHARS_PUSH = 60;  

    let clearTimer = null;
    let currBuffer = "";

    function resetClearTimer() {
      clearTimeout(clearTimer);
      caption.classList.remove("fading");

      clearTimer = setTimeout(() => {
        caption.classList.add("fading");
        setTimeout(() => {
          linePrev.textContent = "";
          linePrev.classList.remove("visible");
          lineCurr.textContent = "";
          currBuffer = "";
          caption.classList.remove("fading");
        }, 600);
      }, CLEAR_DELAY);
    }

    ipcRenderer.on("caption", (_, text) => {
      if (!text || text === currBuffer) return;

      if (currBuffer.length >= MIN_CHARS_PUSH) {
        linePrev.textContent = currBuffer;
        linePrev.classList.add("visible");
        currBuffer = text;
      } else {
        currBuffer = currBuffer ? `${currBuffer} ${text}` : text;
      }

      lineCurr.textContent = currBuffer;
      resetClearTimer();
    });

    const el = document.getElementById("caption");
    let dragging = false;
    let startX = 0, startY = 0;
    let winX = 0, winY = 0;

    el.addEventListener("mousedown", (e) => {
      dragging = true;
      startX = e.screenX;
      startY = e.screenY;
      winX = window.screenX;
      winY = window.screenY;
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const dx = e.screenX - startX;
      const dy = e.screenY - startY;
      ipcRenderer.send("overlay-drag", { x: winX + dx, y: winY + dy });
    });

    window.addEventListener("mouseup", () => { dragging = false; });
  </script>
</body>
</html>
